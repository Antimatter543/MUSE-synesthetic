<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#0f0f1a"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#e0e7ff" letter-spacing="1">
    MUSE — System Architecture
  </text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#6366f1">
    Multimodal Synesthetic Experience Engine
  </text>

  <!-- ─── BROWSER BOX ─── -->
  <rect x="30" y="80" width="200" height="180" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="101" text-anchor="middle" font-size="12" font-weight="700" fill="#a5b4fc">Browser (React + Vite)</text>

  <rect x="48" y="112" width="164" height="28" rx="6" fill="#312e81"/>
  <text x="130" y="130" text-anchor="middle" font-size="10" fill="#c7d2fe">AudioWorklet (PCM 16kHz)</text>

  <rect x="48" y="148" width="164" height="28" rx="6" fill="#312e81"/>
  <text x="130" y="166" text-anchor="middle" font-size="10" fill="#c7d2fe">Camera (JPEG frames)</text>

  <rect x="48" y="184" width="164" height="28" rx="6" fill="#312e81"/>
  <text x="130" y="202" text-anchor="middle" font-size="10" fill="#c7d2fe">Audio Playback (PCM 24kHz)</text>

  <rect x="48" y="220" width="164" height="28" rx="6" fill="#312e81"/>
  <text x="130" y="238" text-anchor="middle" font-size="10" fill="#c7d2fe">Gallery / Image Display</text>

  <!-- ─── WEBSOCKET ─── -->
  <rect x="285" y="130" width="130" height="52" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#7dd3fc">WebSocket</text>
  <text x="350" y="168" text-anchor="middle" font-size="9" fill="#94a3b8">/ws/{'{'}session_id{'}'}</text>

  <!-- Browser → WebSocket arrows -->
  <line x1="230" y1="150" x2="285" y2="150" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="256" y="145" text-anchor="middle" font-size="8" fill="#818cf8">PCM audio</text>

  <line x1="230" y1="165" x2="285" y2="160" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="256" y="180" text-anchor="middle" font-size="8" fill="#818cf8">JPEG frames</text>

  <!-- ─── FASTAPI ─── -->
  <rect x="285" y="230" width="130" height="52" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#6ee7b7">FastAPI Server</text>
  <text x="350" y="268" text-anchor="middle" font-size="9" fill="#94a3b8">Cloud Run (port 8080)</text>

  <!-- WebSocket → FastAPI -->
  <line x1="350" y1="182" x2="350" y2="230" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── ADK RUNNER ─── -->
  <rect x="470" y="130" width="150" height="52" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="545" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#fcd34d">ADK Runner</text>
  <text x="545" y="168" text-anchor="middle" font-size="9" fill="#94a3b8">LiveRequestQueue</text>

  <!-- FastAPI → ADK -->
  <line x1="415" y1="256" x2="545" y2="182" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── ORCHESTRATOR ─── -->
  <rect x="440" y="240" width="210" height="66" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="545" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#c4b5fd">MuseOrchestrator</text>
  <text x="545" y="278" text-anchor="middle" font-size="9" fill="#a78bfa">Gemini 2.5 Flash Live</text>
  <text x="545" y="294" text-anchor="middle" font-size="8" fill="#6d6d8a">native-audio-preview</text>

  <!-- ADK → Orchestrator -->
  <line x1="545" y1="182" x2="545" y2="240" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── TOOLS / SUB-AGENTS ─── -->

  <!-- generate_synesthetic_image -->
  <rect x="285" y="380" width="185" height="56" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="377" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="#f9a8d4">generate_synesthetic_image</text>
  <text x="377" y="418" text-anchor="middle" font-size="9" fill="#94a3b8">Gemini 2.0 Flash (img gen)</text>

  <!-- Orchestrator → Image gen -->
  <line x1="480" y1="306" x2="400" y2="380" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PoetryAgent -->
  <rect x="488" y="368" width="145" height="42" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="560" y="386" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">PoetryAgent</text>
  <text x="560" y="400" text-anchor="middle" font-size="9" fill="#94a3b8">Gemini 2.5 Flash</text>

  <!-- NarrativeAgent -->
  <rect x="488" y="424" width="145" height="42" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="560" y="442" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">NarrativeAgent</text>
  <text x="560" y="456" text-anchor="middle" font-size="9" fill="#94a3b8">Gemini 2.5 Flash</text>

  <!-- Orchestrator → Poetry -->
  <line x1="560" y1="306" x2="560" y2="368" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Orchestrator → Narrative -->
  <line x1="565" y1="306" x2="575" y2="424" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ─── STORAGE ─── -->

  <!-- GCS -->
  <rect x="120" y="390" width="130" height="48" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="185" y="411" text-anchor="middle" font-size="10" font-weight="700" fill="#7dd3fc">Cloud Storage</text>
  <text x="185" y="427" text-anchor="middle" font-size="9" fill="#94a3b8">GCS (gallery images)</text>

  <!-- Image gen → GCS -->
  <line x1="320" y1="436" x2="250" y2="428" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Firestore -->
  <rect x="120" y="456" width="130" height="48" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="185" y="477" text-anchor="middle" font-size="10" font-weight="700" fill="#fdba74">Firestore</text>
  <text x="185" y="493" text-anchor="middle" font-size="9" fill="#94a3b8">gallery metadata</text>

  <!-- Image gen → Firestore -->
  <line x1="310" y1="436" x2="250" y2="462" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ─── LEGEND ─── -->
  <rect x="30" y="548" width="840" height="52" rx="8" fill="#0d0d1f" stroke="#2d2d4a" stroke-width="1"/>
  <text x="44" y="568" font-size="10" fill="#6d6d8a" font-weight="600">Legend:</text>

  <rect x="100" y="558" width="12" height="12" rx="2" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="118" y="568" font-size="9" fill="#94a3b8">Browser / UI</text>

  <rect x="195" y="558" width="12" height="12" rx="2" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="213" y="568" font-size="9" fill="#94a3b8">Orchestrator</text>

  <rect x="295" y="558" width="12" height="12" rx="2" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="313" y="568" font-size="9" fill="#94a3b8">Sub-agents</text>

  <rect x="390" y="558" width="12" height="12" rx="2" fill="#1e1b4b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="408" y="568" font-size="9" fill="#94a3b8">Image Generation</text>

  <rect x="510" y="558" width="12" height="12" rx="2" fill="#1e1b4b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="528" y="568" font-size="9" fill="#94a3b8">Cloud Storage</text>

  <rect x="615" y="558" width="12" height="12" rx="2" fill="#1e1b4b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="633" y="568" font-size="9" fill="#94a3b8">Firestore</text>

  <!-- Second legend row -->
  <line x1="100" y1="590" x2="124" y2="590" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="132" y="594" font-size="9" fill="#94a3b8">Data / control flow</text>

  <text x="700" y="568" text-anchor="end" font-size="9" fill="#4a4a6a">MUSE • Gemini Live Agent Challenge 2026</text>
</svg>
